<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border-style:solid ;
        }
        #box1{
            border-style: double;
            border-width:1px;
            border-color: #f00;
            /* 四条边框都是双实线 */
            /* 宽度为1像素 */
            /* 边框颜色为红色 */
        }
        #box2{
            border-style: solid dashed;
            border-width: 2px 1px;
            border-color: #f00 #00f;
            /* 上下边框为实线，左右边框为虚线 */
            /* 上下边框宽度为2像素，左右边框宽度为1像素  */
            /* 上下边框颜色为红色，左右边框颜色为蓝色 */
        }
        #box3{
            border-style: solid double dashed dotted;
            border-width: 2px 3px 4px;
            border-color: #f00 #00f #0f0;
            /* 上边框为实线，右边框为双实线，下边框为虚线，左边框为点线 */
            /* 上边框宽度为2像素，右、左边框宽度为3像素，下边框宽度为4像素 */
            /* 上边框颜色为红色，左\右边框颜色为蓝色，下边框颜色为绿色 */
        }
    </style>
</head>
<body>
    <div id="box1">边框样式为double</div>
    <div id="box2">边框样式为solid dashed</div>
    <div id="box3">边框样式为solid double dashed dotted</div>
</body>
</html>
