<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物名片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        div{
            width: 760px;
            height: 600px;
            border: solid 3px #999;
            padding: 5px;
            transition: border-color 0.3s ease;
        }
        div:hover {
            border-color: #000;
        }
        #cjl{
            padding: 5px;
        }
        hr{
            border: dashed 1px;
            margin: 30px auto;
        }
        p.bt{
            font-size: 30px;
            padding-top: 40px;
            margin-left: 10px;
        }
        p.nr{
            font-size: 18px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div>
        <img src="images/cjl.jpg" width="750" height="350" alt="长颈鹿" id="cjl">
        <p class="bt">长颈鹿</p>
        <hr>
        <p class="nr">长颈鹿（学名：Giraffa camelopardalis）：是一种生长在非洲的反刍偶蹄动物，拉丁文名字的意思是“长着豹纹的骆驼”。它们是世界上现存最高的陆生动物。</p>
    </div>
</body>
</html>
