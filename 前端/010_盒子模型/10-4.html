<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box1{
            border-top: solid 2px #f00;
            border-right: double 3px #f90;
            border-bottom: dotted 2px #c0f;
            border-left:  double 3px #f90;
            /* 设置上边框为红色实线，宽度为2像素
            设置右边框为橙色双实线，宽度为3像素
 2 1bbbbbbbbbbbb                                                                                                                                                                                       设置下边框为紫色点线，宽度为2像素
            设置左边框为橙色双实线，宽度为3像素 */                                                                                                                                                                                           
        }
        #box2{
            border: solid 3px #00f;
            /* 设置四条边框为蓝色实线，宽度为3像素 */
        }
    </style>
</head>
<body>
    <div id="box1">上边框为红色实线，右边框为橙色双实线，下边框为紫色点线，左边框为橙色双实线</div>
    <p></p>
    <div id="box2">四条边框为蓝色实线，宽度为3像素</div>
</body>
</html>
