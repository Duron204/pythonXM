<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .father{
            margin: 10px auto;
            width: 300px;
            height: 300px;
            padding: 10px;
            background-color: #c0c0c0;
            border: 1px dashed #666;
            position: relative;
        }
        .box1,.box2, .box3{
            width: 100px;
            line-height: 40px;
            background-color: #9f6;
            margin: 15px;
            height: 40px;
            padding: 0px 10px;
            border: 1px solid #999;
        }
        .box2{
            position: absolute;
            top: 100px;
            left: 150px;
        }
        </style>
</head>
<body>
    <div class="father">
        <div class="box1">盒子1</div>
        <div class="box2">盒子2</div>
        <div class="box3">盒子3</div>
    </div>
    
</body>
</html>
