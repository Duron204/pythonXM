<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数组对象的使用</title>
    <script>
        var students = new Array("张三", "李四", "王五");
        var students1 = ["zhangsan", "lisi", "wangwu"];
        document.write("<ol>");
        document.write("<li>" ,students, "</li>");//直接输出数组对象，默认调用toString()方法，元素之间用逗号分隔。
        document.write("<li>" ,students.join(), "</li>");//join()方法将数组元素连接成一个字符串，默认使用逗号分隔。
        document.write("<li>" ,students.join("、"), "</li>");//join()方法可以指定分隔符，这里使用中文顿号。
        document.write("<li>" ,students.reverse(), "</li>");//reverse()方法将数组元素的顺序颠倒。
        document.write("<li>" ,students.concat(students1), "</li>");//concat()方法用于合并两个或多个数组，返回一个新数组，不改变原数组。
        document.write("<li>" ,students1.sort(), "</li>");//sort()方法用于对数组元素进行排序，默认按照字符串Unicode码点进行排序。
        document.write("</ol>");
    </script>
</head>
<body>
    
</body>
</html>
