<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Date 对象的使用</title>
    <script>
        var date = new Date();
        var year = date.getFullYear();
        var month = date.getMonth();
        month = month + 1;
        var day = date.getDate();
        document.write("当前日期为：" + year + "年 " + month + "月 " + day + "日 ");
    </script>
</head>

<body>
</body>

</html>
