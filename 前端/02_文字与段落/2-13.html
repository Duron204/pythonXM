    <title>古诗欣赏 - 咏柳</title>

<body>
    <h1>咏柳</h1>
    <p>[唐]贺知章</p>

    <p>碧玉<sup>[1]</sup>妆<sup>[2]</sup>成一树<sup>[3]</sup>高，</p>
    <p>万条垂下绿丝绦<sup>[4]</sup>。</p>
    <p><u>不知细叶谁裁出，</u></p>
    <p><u>二月春风似剪刀。</u></p>
    <hr>
    <ul>
        <li><strong>诗词注释</strong></li>
        <ol>
            <li>[1]碧玉：青绿色的玉。这里用以比喻春天嫩绿的柳叶。</li>
            <li>[2]妆：装饰，打扮。</li>
            <li>[3]一树：满树</li>
            <li>[4]绦（tāo）：用丝编成的绳带。这里指像丝带一样的柳条。</li>
        </ol>
        <li><strong>画线诗句译文</strong></li>
        <ol>
            <li>这细细的嫩叶是谁的巧手裁剪出来的呢？原来是那二月里温暖的春风，它就像一把灵巧的剪刀。</li>
        </ol>

        </ol>
    </ul>
</body>
