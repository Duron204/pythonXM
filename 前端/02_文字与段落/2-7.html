<body>
    <p>静夜思</p>
    <hr width="100px" size="3px" color="#FF0000" align="left">
    <p>作者：李白</p>
    床前明月光，<br>
    疑似地上霜。<br>
    举头望明月，<br>
    低头思故乡。
