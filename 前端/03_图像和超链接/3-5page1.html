        <br>
        <li>HTML5 是定义 HTML 标准的新版本，具有新的元素、属性和行为。</li>
        <li>HTML5 的设计目的是在移动设备上支持多媒体。</li>
        <br>
        <li>随着移动通信技术的快速发展，HTML5 将成为主流。</li>
