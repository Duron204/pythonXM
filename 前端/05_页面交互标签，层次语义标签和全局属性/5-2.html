<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>&lt;progress&gt; 标签的使用</title>
</head>
<body>
    progress 标签用法一：表示任务正在进行
    <br>工作进行中：
    <progress></progress>
    <br>progress 标签用法二：表示已完成的任务量
    <br>已修满学分：
    <progress value="66" max="100"></progress>
</body>
</html>
