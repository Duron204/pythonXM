<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-size: 16px;
            font-style: italic;
        }
        p{
            font-family: "黑体";
        }
        .font1{
            text-decoration: underline;
        }
        .bluefont{
            color: #00F;
        }
    </style>
</head>
<body>
    <h1>更改&lt;h1&gt;标签的外观样式</h1>
    <h1 class="bluefont">此处&lt;h1&gt;标签设置了类选择器</h1>
    <p>更改所有&lt;p&gt;标签的外观样式</p>
    <p class="bluefont font1">此处&lt;p&gt;标签设置了两个类选择器</p>
</body>
</html>
